<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Blockchain - Mineradores em Ação</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .status-conexao {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.online {
            background: #4ade80;
        }

        .status-dot.offline {
            background: #f87171;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .mineradores-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .minerador-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .minerador-card.ativo {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-left-color: #4ade80;
            box-shadow: 0 5px 15px rgba(74, 222, 128, 0.2);
        }

        .minerador-card.vencedor {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            border-left-color: #fbbf24;
            animation: winner-pulse 0.6s ease;
        }

        @keyframes winner-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .minerador-nome {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .minerador-stats {
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
        }

        .blocos-container {
            grid-column: 1 / -1;
            max-height: 600px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
        }

        .bloco-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            animation: slide-in 0.5s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .bloco-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .bloco-indice {
            font-size: 1.3em;
            font-weight: bold;
        }

        .bloco-minerador {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .bloco-info {
            font-size: 0.85em;
            opacity: 0.9;
            margin-top: 8px;
        }

        .timestamp {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 8px;
        }

        .placar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.3s ease;
        }

        .placar-item:hover {
            background: #f9f9f9;
        }

        .placar-nome {
            font-weight: 600;
            color: #667eea;
        }

        .placar-blocos {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .vazio-mensagem {
            text-align: center;
            padding: 20px;
            color: #999;
            font-style: italic;
        }

        .countdown {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            .mineradores-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Monitor Blockchain</h1>
            <p>Sistema de Mineração Distribuída com Kafka</p>
        </div>

        <div class="content">
            <!-- Mineradores Ativos -->
            <div class="card">
                <h2>🏗️ Mineradores Ativos</h2>
                <div class="status-conexao">
                    <div id="status-servidor" class="status-dot offline"></div>
                    <span id="status-texto">Aguardando conexão...</span>
                </div>
                <div class="mineradores-grid" id="mineradores-container">
                    <div class="vazio-mensagem">Aguardando mineradores...</div>
                </div>
            </div>

            <!-- Placar -->
            <div class="card">
                <h2>🏆 Placar de Blocos</h2>
                <div id="placar-container">
                    <div class="vazio-mensagem">Nenhum bloco minerado ainda...</div>
                </div>
            </div>

            <!-- Blocos Minerados -->
            <div class="card full-width">
                <h2>⛏️ Blocos Minerados (Disseminação via Kafka)</h2>
                <div class="blocos-container" id="blocos-container">
                    <div class="vazio-mensagem">Aguardando mineração do primeiro bloco...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let estado = {
            mineradores: {},
            blocos_minerados: [],
            servidor_conectado: false
        };

        // Conexão WebSocket
        socket.on('connect', function() {
            console.log('Conectado ao monitor');
        });

        socket.on('estado_inicial', function(data) {
            console.log('Estado inicial recebido:', data);
            estado = data;
            atualizarUI();
        });

        socket.on('bloco_minerado', function(data) {
            console.log('Novo bloco minerado:', data);
            
            // Adiciona o bloco ao estado
            estado.blocos_minerados.push(data);
            
            // Atualiza contador do minerador
            if (!estado.mineradores[data.minerador]) {
                estado.mineradores[data.minerador] = {
                    nome: data.minerador,
                    blocos_resolvidos: 0,
                    status: 'ativo'
                };
            }
            estado.mineradores[data.minerador].blocos_resolvidos += 1;
            
            atualizarUI();
            
            // Efeito visual de vitória
            mostrarVencedor(data.minerador, data.indice);
        });

        async function atualizarEstadoPorApi() {
            try {
                const resp = await fetch('/api/estado', { cache: 'no-store' });
                if (!resp.ok) return;
                const dados = await resp.json();

                estado.mineradores = dados.mineradores || {};
                estado.blocos_minerados = dados.blocos_minerados || [];
                atualizarUI();
            } catch (err) {
                console.warn('Falha ao atualizar estado via API:', err);
            }
        }

        function atualizarUI() {
            atualizarMineradores();
            atualizarPlacar();
            atualizarBlocos();
            atualizarStatusServidor();
        }

        function atualizarMineradores() {
            const container = document.getElementById('mineradores-container');
            
            if (Object.keys(estado.mineradores).length === 0) {
                container.innerHTML = '<div class="vazio-mensagem">Aguardando mineradores...</div>';
                return;
            }
            
            container.innerHTML = Object.values(estado.mineradores).map(minerador => `
                <div class="minerador-card ${minerador.status === 'ativo' ? 'ativo' : ''}">
                    <div class="minerador-nome">${minerador.nome}</div>
                    <div class="minerador-stats">
                        <span>Blocos: <strong>${minerador.blocos_resolvidos}</strong></span>
                        <span class="countdown"></span>
                    </div>
                </div>
            `).join('');
        }

        function atualizarPlacar() {
            const container = document.getElementById('placar-container');
            const placar = Object.values(estado.mineradores)
                .sort((a, b) => b.blocos_resolvidos - a.blocos_resolvidos);
            
            if (placar.length === 0) {
                container.innerHTML = '<div class="vazio-mensagem">Nenhum bloco minerado ainda...</div>';
                return;
            }
            
            container.innerHTML = placar.map((m, idx) => `
                <div class="placar-item">
                    <span class="placar-nome">${idx + 1}º • ${m.nome}</span>
                    <span class="placar-blocos">${m.blocos_resolvidos}</span>
                </div>
            `).join('');
        }

        function atualizarBlocos() {
            const container = document.getElementById('blocos-container');
            
            if (estado.blocos_minerados.length === 0) {
                container.innerHTML = '<div class="vazio-mensagem">Aguardando mineração do primeiro bloco...</div>';
                return;
            }
            
            // Ordena do mais recente para o mais antigo
            const blocos = [...estado.blocos_minerados].reverse();
            
            container.innerHTML = blocos.map(bloco => `
                <div class="bloco-item">
                    <div class="bloco-header">
                        <span class="bloco-indice">Bloco #${bloco.indice}</span>
                        <span class="bloco-minerador">${bloco.minerador}</span>
                    </div>
                    <div class="bloco-info">
                        <strong>Nonce:</strong> ${bloco.nonce} | <strong>Hash:</strong> ${bloco.hash}...
                    </div>
                    <div class="timestamp">${new Date(bloco.timestamp).toLocaleTimeString('pt-BR')}</div>
                </div>
            `).join('');
        }

        function atualizarStatusServidor() {
            const dot = document.getElementById('status-servidor');
            const texto = document.getElementById('status-texto');
            
            if (estado.servidor_conectado) {
                dot.classList.remove('offline');
                dot.classList.add('online');
                texto.textContent = '✓ Servidor conectado';
            } else {
                dot.classList.remove('online');
                dot.classList.add('offline');
                texto.textContent = '✗ Servidor desconectado';
            }
        }

        function mostrarVencedor(minerador, indice) {
            // Efeito visual de vitória
            const cards = document.querySelectorAll('.minerador-card');
            cards.forEach(card => {
                if (card.querySelector('.minerador-nome').textContent === minerador) {
                    card.classList.add('vencedor');
                    setTimeout(() => card.classList.remove('vencedor'), 2000);
                }
            });
        }

        // Atualizar a cada 5 segundos
        setInterval(() => {
            socket.emit('ping');
        }, 5000);

        // Fallback: polling periódico para manter o painel atualizado
        setInterval(() => {
            atualizarEstadoPorApi();
        }, 3000);

        // Inicializar
        atualizarUI();
        atualizarEstadoPorApi();
    </script>
</body>
</html>
